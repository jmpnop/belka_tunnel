name: ci

# Runs on every push to main and every PR, on OUR self-hosted macOS runner
# (this repo's build Mac) — NOT GitHub-hosted runners, which are billed and
# blocked by the account's billing lock. Catches breakage from refactors
# before they land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, macOS]
    env:
      CARGO_NET_RETRY: 10
      RUST_BACKTRACE: short

    steps:
      - uses: actions/checkout@v4

      # The build Mac already has rust + uv + brew installed; ./bt bootstraps
      # its own uv venv and self-adds cross-compile targets. No toolchain-install
      # or cache actions needed on a persistent self-hosted runner.
      - name: bt precommit (fmt + clippy + tests)
        run: ./bt precommit

      # Build both apps as UNIVERSAL bundles — catches bundling regressions
      # (Info.plist, codesign, dmgbuild settings) the unit tests can't see.
      - name: bt bundle (БелкаТуннель, universal)
        run: ./bt bundle

      - name: bt verify bundle
        run: ./bt verify bundle

      - name: bt bundle-pfusers (universal)
        run: ./bt bundle-pfusers

      - name: bt verify pfusers
        run: ./bt verify pfusers
