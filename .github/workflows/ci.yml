name: ci

# Run on every push to main and on every PR. Catches breakage from
# refactors before they land. Cheap — macos-14 + cached target/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      RUST_BACKTRACE: short
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + workspace target
        uses: actions/cache@v4
        with:
          # Workspace target lives at the repo root now (not app/target/).
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ws-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ws-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync (harness deps)
        run: uv sync --project tools --dev

      # The `bt precommit` step runs fmt-check + clippy + the test suite
      # against the workspace. That's our single CI gate; if it passes,
      # the workspace is in a publishable state.
      - name: bt precommit (fmt + clippy + tests)
        run: ./bt precommit

      # Spot-check that the .app + DMG paths still build — catches
      # bundling regressions (Info.plist, codesign, dmgbuild settings)
      # that the unit tests can't see.
      - name: bt bundle (БелкаТуннель)
        run: ./bt bundle

      - name: bt verify bundle
        run: ./bt verify bundle

      - name: bt bundle-pfusers
        run: ./bt bundle-pfusers

      - name: bt verify pfusers
        run: ./bt verify pfusers
