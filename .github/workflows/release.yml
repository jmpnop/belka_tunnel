name: release

# Triggered by `git push origin vX.Y.Z`. Builds both apps as universal
# binaries, signs + notarizes if the right secrets are present (no-ops
# locally without them so the workflow stays usable from forks), and
# attaches the two DMGs to a GitHub release named after the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write   # uploading release assets

    env:
      CARGO_INCREMENTAL: 0
      CARGO_NET_RETRY: 10
      RUST_BACKTRACE: short

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + workspace target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ws-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ws-

      - name: Install Rust + cross-compile targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: uv sync (harness deps)
        run: uv sync --project tools --dev

      - name: bt precommit (sanity gate)
        run: ./bt precommit

      # ---------- Signing identity ----------
      # Only runs if the maintainer set the certificates secret; without
      # it, builds remain ad-hoc-signed (Gatekeeper warning on download).
      - name: Import codesigning certs
        if: ${{ secrets.CERTIFICATES_P12 != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      # ---------- БелкаТуннель build ----------
      - name: bt universal (BelkaTunnel)
        run: ./bt universal

      - name: bt bundle --universal
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          USE_UNIVERSAL: "1"
        run: ./bt bundle --universal

      - name: bt verify bundle
        run: ./bt verify bundle

      - name: bt dmg
        run: ./bt dmg

      - name: bt verify dmg
        run: ./bt verify dmg

      # ---------- pfUsers build ----------
      - name: bt bundle-pfusers
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: ./bt bundle-pfusers

      - name: bt verify pfusers
        run: ./bt verify pfusers

      - name: bt dmg-pfusers
        run: ./bt dmg-pfusers

      - name: bt verify pfusers-dmg
        run: ./bt verify pfusers-dmg

      # ---------- Notarize ----------
      # Only runs if BOTH a signing identity and the notary creds are
      # set — Apple notarytool refuses an ad-hoc-signed binary. The
      # `bt notarize` step (when wired) hits app/dist/*.dmg in place.
      - name: Store notarytool credentials
        if: ${{ secrets.APPLE_ID != '' && secrets.SIGN_IDENTITY != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials BELKA-NOTARY \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Notarize + staple (BelkaTunnel)
        if: ${{ secrets.SIGN_IDENTITY != '' && secrets.APPLE_ID != '' }}
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: BELKA-NOTARY
        run: ./bt notarize

      # ---------- Publish ----------
      - name: Create GitHub release with both DMGs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/BelkaTunnel-*.dmg
            pfusers/dist/pfUsers-*.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
