name: release

# Triggered by `git push origin vX.Y.Z`. Runs on OUR self-hosted macOS runner
# (this repo's build Mac) — NOT GitHub-hosted runners, which are billed and
# blocked by the account's billing lock. The runner builds both apps as
# universal binaries, signs + notarizes if the right secrets are present
# (no-ops without them → ad-hoc DMGs), and attaches the two DMGs to a GitHub
# release named after the tag.
#
# NOTE: the `secrets` context is NOT available in step `if:` conditions, so
# signing/notarization are gated on outputs of the "Detect signing" step
# (which CAN read secrets via step `env`). Referencing `secrets` in an `if:`
# makes GitHub reject the whole file at parse time — do not reintroduce it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    # Our Mac. Labels: self-hosted + the OS. The runner is registered by
    # scripts/setup-runner.sh. If this ever needs to fan out to more than one
    # build Mac, add a distinguishing label here.
    runs-on: [self-hosted, macOS]
    permissions:
      contents: write   # uploading release assets

    env:
      CARGO_NET_RETRY: 10
      RUST_BACKTRACE: short

    steps:
      - uses: actions/checkout@v4

      # secrets are readable in step `env` (unlike `if:`), so we turn them
      # into plain boolean outputs the later steps can gate on.
      - name: Detect signing capability
        id: caps
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -n "$SIGN_IDENTITY" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No SIGN_IDENTITY secret — producing ad-hoc-signed DMGs."
          fi
          if [ -n "$SIGN_IDENTITY" ] && [ -n "$APPLE_ID" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
          fi

      # The build Mac already has rust + uv + brew (dmgbuild) installed; ./bt
      # bootstraps its own uv venv and self-adds the cross-compile targets. No
      # toolchain-install or cache actions needed on a persistent self-hosted
      # runner.
      - name: bt precommit (sanity gate)
        run: ./bt precommit

      # ---------- БелкаТуннель ----------
      - name: bt bundle (universal)
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: ./bt bundle

      - name: bt verify bundle
        run: ./bt verify bundle

      - name: bt dmg
        run: ./bt dmg

      - name: bt verify dmg
        run: ./bt verify dmg

      # ---------- pfUsers ----------
      - name: bt bundle-pfusers (universal)
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: ./bt bundle-pfusers

      - name: bt verify pfusers
        run: ./bt verify pfusers

      - name: bt dmg-pfusers
        run: ./bt dmg-pfusers

      - name: bt verify pfusers-dmg
        run: ./bt verify pfusers-dmg

      # ---------- Notarize (only with a signing identity + notary creds) ----------
      # On a self-hosted Mac the Developer ID key lives in the login keychain,
      # so bt signs with SIGN_IDENTITY directly — no p12 import step needed.
      - name: Store notarytool credentials
        if: steps.caps.outputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials BELKA-NOTARY \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Notarize + staple (BelkaTunnel)
        if: steps.caps.outputs.notarize == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: BELKA-NOTARY
        run: ./bt notarize

      # ---------- Publish ----------
      - name: Create GitHub release with both DMGs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/BelkaTunnel-*.dmg
            pfusers/dist/pfUsers-*.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
